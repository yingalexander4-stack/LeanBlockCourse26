name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '*.md'
      - '_config.yml'
      - 'lecture-slides/**'
      - 'LeanBlockCourse26/**'
      - 'scripts/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

# Do NOT cancel in-progress deploys — cancellation can wedge the Pages
# deployment state, causing 404s (actions/deploy-pages#22).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git-blame timestamps
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python scripts/generate-outline.py
          python scripts/generate-tactics.py --github-blob "https://github.com/FordUniver/LeanBlockCourse26/blob/main"
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
